name: lorofy

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_riverpod: ^3.3.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.3.0

  # Networking
  dio: ^5.10.0
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^10.3.1

  # Thêm dòng này để sử dụng các font cao cấp tự động
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  pinput: ^6.0.2

dev_dependencies:
  build_runner: ^2.4.11
  riverpod_generator: ^4.0.0
  
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  

flutter:
  uses-material-design: true

  assets:
    - assets/logos/
    - assets/images/
    - assets/illustrations/
    - assets/icons/

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Light.ttf
          weight: 300
        - asset: assets/fonts/Fredoka-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
    - family: NerkoOne
      fonts:
        - asset: assets/fonts/NerkoOne-Regular.ttf
          weight: 400

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/lorofy.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logos/lorofy.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/logos/lorofy.png"
  macos:
    generate: true
    image_path: "assets/logos/lorofy.png"
